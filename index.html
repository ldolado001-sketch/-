<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하시교육 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F1F3F5; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="min-h-screen flex overflow-hidden">

    <!-- 개발자 로그인 모달 -->
    <div id="login-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl border border-slate-100">
            <h3 class="text-2xl font-black text-slate-800 mb-6 text-center">개발자 인증</h3>
            <input type="password" id="dev-password" placeholder="비밀번호" class="w-full px-6 py-4 rounded-2xl bg-slate-100 border-none mb-4 text-center tracking-widest outline-none">
            <p id="login-error" class="text-rose-500 text-sm font-bold text-center hidden mb-4">비밀번호가 틀렸습니다.</p>
            <div class="flex space-x-3">
                <button onclick="closeLoginModal()" class="flex-1 py-4 rounded-2xl bg-slate-100 font-black">취소</button>
                <button onclick="attemptLogin()" class="flex-1 py-4 rounded-2xl bg-orange-500 text-white font-black">인증</button>
            </div>
        </div>
    </div>

    <!-- 사이드바 -->
    <aside class="w-80 glass-card flex flex-col border-r border-slate-200 h-screen shrink-0">
        <div class="p-10 mb-6">
            <div class="flex items-center space-x-4">
                <div class="bg-orange-500 p-3 rounded-2xl shadow-lg"><i class="fas fa-star text-white text-xl"></i></div>
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tighter leading-none">하시교육</h1>
                    <p class="text-[10px] text-orange-600 font-black tracking-widest mt-2">4학년 교육 · 주산 전문</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-6 space-y-2">
            <button onclick="router.go('dashboard')" id="nav-dashboard" class="w-full flex items-center space-x-4 px-6 py-5 rounded-2xl font-black transition-all">
                <i class="fas fa-th-large"></i><span>과목 선택</span>
            </button>
            <button onclick="router.go('download')" id="nav-download" class="w-full flex items-center space-x-4 px-6 py-5 rounded-2xl font-black transition-all">
                <i class="fas fa-file-arrow-down"></i><span>학습지 자료실</span>
            </button>
        </nav>
        <div class="p-10">
            <button onclick="openLoginModal()" class="text-slate-400 font-bold hover:text-orange-500 flex items-center space-x-2">
                <i class="fas fa-code"></i><span id="dev-btn-text">개발자 로그인</span>
            </button>
        </div>
    </aside>

    <!-- 메인 영역 -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-20 px-12 flex items-center justify-between shrink-0">
            <div class="glass-card px-6 py-2 rounded-full flex items-center space-x-3">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Admin Center</span>
                <div id="dev-badge" class="hidden px-3 py-0.5 bg-orange-500 text-white text-[10px] font-black rounded-lg">DEV MODE</div>
            </div>
            <div class="ml-auto w-10 h-10 rounded-xl bg-slate-800 text-white flex items-center justify-center font-black shadow-lg">H</div>
        </header>
        <div id="app-viewport" class="flex-1 overflow-y-auto p-12 scroll-hide"></div>
    </main>

    <script>
        const units = {
            korean: [
                { 
                    id: 1, 
                    title: '1단원: 생각하며 읽기', 
                    lesson: { 
                        passageTitle: "꼬마 여우의 용기 있는 고백", 
                        passageText: "햇살이 따뜻하게 내리쬐는 어느 봄날이었습니다. 꼬마 여우 루루는 친구들이 아끼는 꽃밭을 실수로 망가뜨렸습니다. 루루는 고민 끝에 사과 편지를 쓰기로 했습니다.", 
                        quiz: [
                            { question: "루루가 사과하기 위해 선택한 방법은?", options: ["모르는 척하기", "편지 쓰기", "꽃 사오기", "도망가기"], answer: 1 },
                            { question: "날씨는 어떠했나요?", options: ["비가 왔다", "눈이 내렸다", "따뜻했다", "태풍이 불었다"], answer: 2 }
                        ] 
                    } 
                },
                { 
                    id: 2, 
                    title: '2단원: 내용을 간추려요', 
                    lesson: { 
                        passageTitle: "우리가 지켜야 할 전통 놀이", 
                        passageText: "윷놀이는 설날에 가족들이 모여 즐기는 대표적인 전통 놀이입니다. 네 개의 윷가락을 던져 도, 개, 걸, 윷, 모가 나오는 결과에 따라 말을 움직입니다.", 
                        quiz: [
                            { question: "윷놀이는 주로 언제 하나요?", options: ["추석", "어린이날", "설날", "크리스마스"], answer: 2 },
                            { question: "윷가락은 총 몇 개인가요?", options: ["2개", "3개", "4개", "5개"], answer: 2 }
                        ] 
                    } 
                }
            ],
            math: [
                { 
                    id: 1, 
                    title: '1단원: 1000의 자리 덧셈', 
                    lesson: { 
                        passageTitle: "주산 암산: 1000의 자리 기초", 
                        passageText: "우리가 지금까지 배운 자연수보다 더 큰 '1000의 자리' 연산을 시작해 봅시다. 1000의 자리 덧셈은 받아올림에 주의해야 합니다. 100의 자리의 합이 10이 되면 1000의 자리로 1을 넘겨주는 규칙을 주판에서도 똑같이 적용합니다.", 
                        quiz: [
                            { question: "1,250 + 2,830을 계산하세요.", options: ["3,080", "4,080", "4,180", "3,980"], answer: 1 },
                            { question: "주판에서 백의 자리가 10이 되면 천의 자리에 몇을 더하나요?", options: ["1", "5", "10", "더하지 않는다"], answer: 0 }
                        ] 
                    } 
                },
                { 
                    id: 2, 
                    title: '2단원: 소수를 먼저 배워요', 
                    lesson: { 
                        passageTitle: "새로운 수의 탄생: 소수", 
                        passageText: "세상에는 1보다 작은 값을 나타내야 할 때가 많습니다. 사과 한 개를 똑같이 열 조각으로 나눈 것 중 한 조각은 어떻게 표현할까요? 바로 이때 '소수'를 사용합니다. 1을 열 개로 나눈 것 중 하나를 0.1이라고 부르기로 약속했습니다.<br><br>주판에서는 빨간색 자릿점을 기준으로 왼쪽은 우리가 아는 일, 십, 백, 천의 자리가 되고, 오른쪽은 0.1(소수 첫째 자리), 0.01(소수 둘째 자리)의 위치가 됩니다. 점(.)의 위치를 정확히 확인하는 것이 소수 공부의 핵심입니다!", 
                        quiz: [
                            { question: "1을 똑같이 10개로 나눈 것 중 하나를 소수로 나타내면?", options: ["0.01", "0.1", "1.0", "0.001"], answer: 1 },
                            { question: "2,000에 0.7을 더하면 어떤 수가 될까요?", options: ["2,000.7", "2,007", "20.7", "2.0007"], answer: 0 }
                        ] 
                    } 
                },
                { 
                    id: 3, 
                    title: '3단원: 큰 수의 곱셈', 
                    lesson: { 
                        passageTitle: "세 자리 수와 두 자리 수의 곱셈", 
                        passageText: "곱셈을 할 때는 자릿수를 정확히 맞추어 계산해야 합니다. 주판의 알을 튕길 때 각 자리의 값을 잊지 않도록 주의합니다.", 
                        quiz: [
                            { question: "125 x 4의 값은?", options: ["400", "500", "600", "450"], answer: 1 },
                            { question: "곱셈에서 가장 중요한 것은?", options: ["빠르기", "자릿수 맞추기", "암산만 하기", "모르겠다"], answer: 1 }
                        ] 
                    } 
                }
            ]
        };

        let state = { 
            currentView: 'dashboard', 
            selectedSubject: null, 
            selectedUnit: null, 
            quizAnswers: {}, 
            showResults: false, 
            isDevMode: false,
            gameState: {
                targetNum: Math.floor(Math.random() * 100) + 1,
                attempts: 0,
                message: "1부터 100 사이의 숫자를 맞춰보세요!",
                isOver: false
            }
        };

        const viewport = document.getElementById('app-viewport');

        const router = {
            go: (view, params = {}) => {
                state.currentView = view;
                if (params.subject) state.selectedSubject = params.subject;
                if (params.unit !== undefined) state.selectedUnit = params.unit;
                if (view !== 'lesson') { state.quizAnswers = {}; state.showResults = false; }
                if (view === 'game') resetGame();
                router.render();
            },
            render: () => {
                viewport.innerHTML = '';
                if (state.currentView === 'dashboard') renderDashboard();
                else if (state.currentView === 'unit-list') renderUnitList();
                else if (state.currentView === 'lesson') renderLesson();
                else if (state.currentView === 'download') renderDownload();
                else if (state.currentView === 'game') renderGame();
                updateSidebar();
            }
        };

        function renderDashboard() {
            viewport.innerHTML = `
                <div class="max-w-6xl mx-auto animate-fade-in text-center">
                    <h2 class="text-[90px] font-black text-slate-800 mb-12 italic tracking-tighter leading-none">Welcome back!</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 px-4">
                        <button onclick="router.go('unit-list', {subject:'korean'})" class="bg-white p-10 rounded-[3.5rem] shadow-sm hover:shadow-xl transition-all border border-white flex flex-col items-center group">
                            <div class="w-24 h-24 rounded-3xl bg-emerald-50 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                <i class="fas fa-book text-emerald-500 text-5xl"></i>
                            </div>
                            <span class="text-3xl font-black">국어 교육</span>
                        </button>
                        <button onclick="router.go('unit-list', {subject:'math'})" class="bg-white p-10 rounded-[3.5rem] shadow-sm hover:shadow-xl transition-all border border-white flex flex-col items-center group">
                            <div class="w-24 h-24 rounded-3xl bg-orange-50 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                <i class="fas fa-calculator text-orange-500 text-5xl"></i>
                            </div>
                            <span class="text-3xl font-black">수학 교육</span>
                        </button>
                        <button onclick="router.go('game')" class="bg-white p-10 rounded-[3.5rem] shadow-sm hover:shadow-xl transition-all border border-white flex flex-col items-center group">
                            <div class="w-24 h-24 rounded-3xl bg-indigo-50 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                <i class="fas fa-gamepad text-indigo-500 text-5xl"></i>
                            </div>
                            <span class="text-3xl font-black">게임 센터</span>
                        </button>
                    </div>
                </div>`;
        }

        function resetGame() {
            state.gameState = {
                targetNum: Math.floor(Math.random() * 100) + 1,
                attempts: 0,
                message: "1부터 100 사이의 숫자를 맞춰보세요!",
                isOver: false
            };
        }

        window.makeGuess = () => {
            const input = document.getElementById('game-input');
            const val = parseInt(input.value);
            if (isNaN(val) || val < 1 || val > 100) return;

            state.gameState.attempts++;
            if (val === state.gameState.targetNum) {
                state.gameState.message = `정답입니다! 🎉 ${state.gameState.attempts}번 만에 맞추셨어요!`;
                state.gameState.isOver = true;
            } else if (val < state.gameState.targetNum) {
                state.gameState.message = `UP! 더 큰 숫자예요.`;
            } else {
                state.gameState.message = `DOWN! 더 작은 숫자예요.`;
            }
            input.value = '';
            router.render();
        };

        function renderGame() {
            viewport.innerHTML = `
                <div class="max-w-2xl mx-auto animate-fade-in text-center">
                    <button onclick="router.go('dashboard')" class="mb-8 font-black text-slate-400 block text-left">← 뒤로가기</button>
                    <div class="bg-white p-12 rounded-[4rem] shadow-2xl border-4 border-indigo-100">
                        <div class="w-20 h-20 bg-indigo-500 rounded-3xl flex items-center justify-center mx-auto mb-8">
                            <i class="fas fa-brain text-white text-3xl"></i>
                        </div>
                        <h3 class="text-4xl font-black text-slate-800 mb-4">숫자 맞추기</h3>
                        <p class="text-xl font-bold text-indigo-600 mb-10">${state.gameState.message}</p>
                        ${!state.gameState.isOver ? `
                            <div class="flex flex-col items-center space-y-6">
                                <input type="number" id="game-input" placeholder="0" class="w-40 text-4xl font-black text-center py-4 rounded-3xl bg-slate-100 border-none outline-none">
                                <button onclick="makeGuess()" class="w-full max-w-xs py-5 bg-indigo-600 text-white rounded-2xl font-black text-xl">확인</button>
                            </div>
                        ` : `
                            <button onclick="router.go('game')" class="w-full max-w-xs py-5 bg-emerald-500 text-white rounded-2xl font-black text-xl">다시 도전!</button>
                        `}
                    </div>
                </div>`;
        }

        function renderUnitList() {
            const data = units[state.selectedSubject];
            viewport.innerHTML = `
                <div class="max-w-4xl mx-auto animate-fade-in">
                    <button onclick="router.go('dashboard')" class="mb-8 font-black text-slate-400">← 뒤로가기</button>
                    <h3 class="text-3xl font-black mb-8">${state.selectedSubject === 'korean' ? '국어' : '수학'} 단원 목록</h3>
                    <div class="space-y-4">
                        ${data.map((u, i) => `
                            <button onclick="router.go('lesson', {unit:${i}})" class="w-full bg-white p-8 rounded-3xl text-left border border-white shadow-sm hover:shadow-md transition-all flex justify-between items-center group">
                                <h4 class="text-xl font-black group-hover:text-orange-500">${u.title}</h4>
                                <i class="fas fa-chevron-right text-slate-300 group-hover:text-orange-500"></i>
                            </button>
                        `).join('')}
                    </div>
                </div>`;
        }

        function renderLesson() {
            const unit = units[state.selectedSubject][state.selectedUnit];
            let quizHtml = unit.lesson.quiz.map((q, qIdx) => `
                <div class="p-8 rounded-3xl bg-slate-50 border-2 ${state.showResults ? (state.quizAnswers[qIdx] === q.answer ? 'border-emerald-200' : 'border-rose-200') : 'border-slate-100'} mb-6">
                    <p class="font-black text-xl mb-6">${qIdx+1}. ${q.question}</p>
                    <div class="grid gap-3">
                        ${q.options.map((opt, oIdx) => {
                            const isSelected = state.quizAnswers[qIdx] === oIdx;
                            const isCorrect = q.answer === oIdx;
                            let btnStyle = "bg-white border-slate-200";
                            if (state.showResults) {
                                if (isCorrect) btnStyle = "bg-emerald-500 text-white border-emerald-500";
                                else if (isSelected) btnStyle = "bg-rose-500 text-white border-rose-500";
                            } else if (isSelected) btnStyle = "border-orange-500 ring-2 ring-orange-100";
                            return `<button onclick="selectAns(${qIdx}, ${oIdx})" class="p-4 rounded-xl border-2 text-left font-bold transition-all ${btnStyle}">${oIdx+1}. ${opt}</button>`;
                        }).join('')}
                    </div>
                </div>`).join('');

            viewport.innerHTML = `
                <div class="max-w-4xl mx-auto animate-fade-in">
                    <button onclick="router.go('unit-list')" class="mb-8 font-black text-slate-400">← 목록으로</button>
                    <div class="bg-white p-12 rounded-[3rem] shadow-lg mb-8">
                        <h3 class="text-3xl font-black mb-8 text-center text-slate-800 underline decoration-orange-300 underline-offset-8">${unit.lesson.passageTitle}</h3>
                        <div class="text-xl leading-relaxed text-slate-600 font-medium">${unit.lesson.passageText}</div>
                    </div>
                    <div class="bg-white p-10 rounded-[3rem] shadow-lg">
                        <h4 class="text-2xl font-black mb-8"><i class="fas fa-edit mr-2 text-orange-500"></i>퀴즈 풀기</h4>
                        ${quizHtml}
                        <button onclick="submitQuiz()" class="w-full py-5 bg-slate-800 text-white rounded-2xl font-black text-xl mt-4 shadow-xl">과제 제출하기</button>
                    </div>
                </div>`;
        }

        function renderDownload() {
            viewport.innerHTML = `
                <div class="max-w-4xl mx-auto animate-fade-in text-center">
                    <h3 class="text-4xl font-black mb-10 text-center">학습지 자료실</h3>
                    <div class="grid gap-6 text-left">
                        <div class="bg-white p-8 rounded-3xl flex justify-between items-center border border-slate-100 shadow-sm">
                            <div><span class="bg-orange-100 text-orange-600 px-2 py-1 rounded text-xs font-black">수학</span><h4 class="text-xl font-black mt-2">주산 1000의자리 연습장</h4></div>
                            <button onclick="window.open('https://docs.google.com/presentation/d/1-znMb7o8JNR4S_0A7Z2WbVAyjLowdQTYhrOO0M4l8Yw/edit?slide=id.g3d885b62350_0_143#slide=id.g3d885b62350_0_143')" class="bg-orange-500 text-white px-6 py-3 rounded-xl font-black shadow-lg shadow-orange-100">자료보기</button>
                        </div>
                        <div class="bg-white p-8 rounded-3xl flex justify-between items-center border border-slate-100 shadow-sm">
                            <div><span class="bg-emerald-100 text-emerald-600 px-2 py-1 rounded text-xs font-black">국어</span><h4 class="text-xl font-black mt-2">국어 단원별 평가지</h4></div>
                            <button onclick="window.open('https://docs.google.com/presentation/d/14sLzWnsByO-_lE3V_U1JVj7LTUlXC0wjuULirLL0EVA/edit?slide=id.p#slide=id.p')" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-black">자료보기</button>
                        </div>
                    </div>
                </div>`;
        }

        window.selectAns = (qIdx, oIdx) => { if(!state.showResults) { state.quizAnswers[qIdx] = oIdx; router.render(); } };
        window.submitQuiz = () => { state.showResults = true; router.render(); };
        window.openLoginModal = () => { if(state.isDevMode) { state.isDevMode = false; updateDevUI(); } else { document.getElementById('login-modal').classList.remove('hidden'); } };
        window.closeLoginModal = () => document.getElementById('login-modal').classList.add('hidden');
        window.attemptLogin = () => { 
            if(document.getElementById('dev-password').value === '1234') { state.isDevMode = true; updateDevUI(); closeLoginModal(); } 
            else { document.getElementById('login-error').classList.remove('hidden'); } 
        };
        function updateDevUI() {
            document.getElementById('dev-badge').classList.toggle('hidden', !state.isDevMode);
            document.getElementById('dev-btn-text').innerText = state.isDevMode ? "로그아웃" : "개발자 로그인";
        }
        function updateSidebar() {
            const isDown = state.currentView === 'download';
            document.getElementById('nav-dashboard').className = `w-full flex items-center space-x-4 px-6 py-5 rounded-2xl font-black ${!isDown ? 'bg-orange-50 text-orange-600' : 'text-slate-400'}`;
            document.getElementById('nav-download').className = `w-full flex items-center space-x-4 px-6 py-5 rounded-2xl font-black ${isDown ? 'bg-orange-50 text-orange-600' : 'text-slate-400'}`;
        }
        window.onload = () => router.render();
    </script>
</body>
</html>
